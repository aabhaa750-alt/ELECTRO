<!DOCTYPE html>
<html lang="en">
<head>
<script>
  (function () {
    var t = localStorage.getItem("em_theme") || "light";
    document.documentElement.setAttribute("data-theme", t);
  })();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ElectroMart - Electronics, Delivered Fast{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block extra_css %}{% endblock %}
</head>
<body>

<!-- Floating balloons overlay (decorative, pointer-events disabled) -->
<div id="emBalloonLayer" class="em-balloon-layer"></div>

<nav class="navbar navbar-expand-lg em-navbar sticky-top">
  <div class="container-fluid px-3 px-lg-4">
    <a class="navbar-brand em-brand" href="/">
      <i class="fa-solid fa-bolt"></i> Electro<span>Mart</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navContent">
      <div class="mx-lg-4 my-2 my-lg-0 flex-grow-1 em-search-wrap">
        <div class="input-group">
          <span class="input-group-text bg-transparent border-0"><i class="fa-solid fa-magnifying-glass"></i></span>
          <input type="text" id="globalSearchInput" class="form-control em-search-input" placeholder="Search for phones, laptops, headphones and more...">
        </div>
      </div>
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        <li class="nav-item"><a class="nav-link" href="/"><i class="fa-solid fa-house"></i> Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/admin"><i class="fa-solid fa-chart-line"></i> Admin</a></li>
        <li class="nav-item">
          <button class="em-fx-btn" id="themeToggleBtn" title="Toggle light / dark mode" onclick="toggleTheme()">
            <i class="fa-solid fa-moon"></i>
          </button>
        </li>
        <li class="nav-item">
          <button class="em-fx-btn" id="soundToggleBtn" title="Toggle sound effects" onclick="toggleSound()">
            <i class="fa-solid fa-volume-high"></i>
          </button>
        </li>
        <li class="nav-item">
          <button class="em-fx-btn" id="musicToggleBtn" title="Toggle background music" onclick="toggleMusic()">
            <i class="fa-solid fa-music" style="opacity:.4"></i>
          </button>
        </li>
        <li class="nav-item">
          <a class="nav-link position-relative" href="#" id="cartToggleBtn">
            <i class="fa-solid fa-cart-shopping"></i> Cart
            <span class="badge rounded-pill em-badge-count" id="cartCountBadge">0</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="em-footer text-center py-4 mt-5">
  <div class="container">
    <p class="mb-1 fw-semibold"><i class="fa-solid fa-bolt"></i> ElectroMart</p>
    <p class="small mb-0 text-secondary">Your one-stop shop for electronics. 100,000+ happy customers served daily.</p>
    <p class="small text-secondary mt-2">Built with Flask · SQLite · Bootstrap · JavaScript</p>
  </div>
</footer>

<div class="em-toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="{{ url_for('static', filename='js/effects.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
